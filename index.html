<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Gate</title>
    <script>
      const payload = new URLSearchParams(location.search).get('q');

      if(payload) {
        let base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
        
        while (base64.length % 4) {
          base64 += '=';
        }
        
        const url = decodeURIComponent(atob(base64));

        location.replace(url);
      }
    </script>
  </head>
  <body>
    <p>If not redirected, <a href="#" id="manualLink">click here</a></p>
    <script>
      document.getElementById('manualLink').href = url;
    </script>
  </body>
</html>
